<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    {{ partial "seo.html" . }}
    {{ partial "analytics.html" . }}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-background text-foreground antialiased selection:bg-primary selection:text-primary-foreground">
    <div class="relative flex min-h-screen flex-col">
        <header class="sticky top-0 z-50 w-full border-b bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
            <div class="container flex h-14 items-center">
                <a href="/" class="mr-6 flex items-center space-x-2">
                    <!-- Replace with your own logo: <img src="/images/logo.png" alt="{{ .Site.Title }}" class="h-8 w-auto"> -->
                    <span class="font-bold sm:inline-block">{{ .Site.Title }}</span>
                </a>
            </div>
        </header>
        <main class="flex-1">
            {{ block "main" . }}{{ end }}
        </main>
        <footer class="py-6 md:px-8 md:py-0 border-t items-center flex">
            <div class="container flex flex-col items-center justify-between gap-4 md:h-24 md:flex-row">
                <p class="text-balance text-center text-sm leading-loose text-muted-foreground md:text-left">
                    &copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.
                </p>
            </div>
        </footer>
    </div>
</body>
</html>
