{{ define "main" }}
<div class="container max-w-5xl py-10">
  <div class="flex flex-col items-start gap-4 md:flex-row md:justify-between md:gap-8">
    <div class="flex-1 space-y-4">
      <h1 class="inline-block font-heading text-4xl tracking-tight lg:text-5xl">{{ .Title }}</h1>
      <div class="prose prose-stone dark:prose-invert max-w-none">
        {{ .Content }}
      </div>
    </div>
  </div>
  <hr class="my-8" />
  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    {{ range .Pages }}
    <article class="group relative flex flex-col space-y-2 border rounded-xl p-4 hover:shadow-lg transition-shadow bg-card text-card-foreground">
      <h2 class="text-2xl font-bold tracking-tight">
        <a href="{{ .Permalink }}" class="after:absolute after:inset-0">
          {{ .Title }}
        </a>
      </h2>
      <p class="text-sm text-muted-foreground">{{ .Date.Format "January 2, 2006" }}</p>
      <div class="mt-auto pt-4 flex items-center text-sm font-medium text-primary">
        Read More
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-1 h-4 w-4"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
